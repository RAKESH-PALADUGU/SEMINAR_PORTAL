<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seminar Details</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: #e2e8f0;
}

header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
    padding: 25px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

header p {
    margin-top: 8px;
    color: #cbd5e1;
}

.container {
    max-width: 950px;
    margin: 40px auto;
    background-color: #111827;
    padding: 35px;
    border-radius: 16px;
    border: 1px solid #1e293b;
}

.seminar-type {
    display: inline-block;
    background-color: #1d4ed8;
    padding: 8px 16px;
    border-radius: 25px;
    font-weight: bold;
    margin-bottom: 20px;
}

h1 {
    color: #f8fafc;
    font-size: 30px;
}

.section {
    margin-top: 30px;
}

.section h2 {
    color: #60a5fa;
    border-bottom: 2px solid #334155;
    padding-bottom: 8px;
}

.info {
    margin: 10px 0;
    font-size: 16px;
    color: #dbeafe;
}

.info strong {
    color: #93c5fd;
}

.button-group {
    margin-top: 35px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    text-decoration: none;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
}

.navigation {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.nav-btn {
    background: #1e293b;
    color: white;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-decoration: none;
}

.nav-btn:hover {
    background: #334155;
}

.nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

footer {
    text-align: center;
    margin-top: 40px;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>Department Research Seminar Portal</h1>
    <p>Seminar Details Page</p>
</header>

<div class="container">

    <div class="seminar-type" id="seminarType">Loading...</div>
    <h1 id="seminarTitle">Loading...</h1>

    <div class="section">
        <h2>Scholar Info</h2>
        <div class="info"><strong>Name:</strong> <span id="scholarName"></span></div>
        <div class="info"><strong>Reg ID:</strong> <span id="regId"></span></div>
    </div>

    <div class="section">
        <h2>Supervisor Info</h2>
        <div class="info"><strong>Supervisor:</strong> <span id="supervisorName"></span></div>
        <div class="info"><strong>Designation:</strong> <span id="supervisorDesignation"></span></div>
    </div>

    <div class="section">
        <h2>Schedule</h2>
        <div class="info"><strong>Date:</strong> <span id="seminarDate"></span></div>
        <div class="info"><strong>Time:</strong> <span id="seminarTime"></span></div>
        <div class="info"><strong>Mode:</strong> <span id="seminarMode"></span></div>
        <div class="info" id="venueWrapper"><strong>Venue:</strong> <span id="venue"></span></div>
    </div>

    <div class="button-group">
        <a class="btn" id="pptButton" href="#">VIEW PPT</a>
        <a class="btn" id="teamsButton" href="#">JOIN TEAMS</a>
    </div>

    <div class="navigation">
        <button class="nav-btn" id="prevBtn">← Previous</button>
        <a class="nav-btn" href="index.html">Home</a>
        <button class="nav-btn" id="nextBtn">Next →</button>
    </div>

</div>

<footer>
Seminar Management System
</footer>

<script>

const sheetID = "1SMkzv_zjjoPNvbkIxz5TGqquVnp4ecmnxClrXoaZraU";
const gid = "1424736644";
const sheetURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

let seminars = [];
let currentIndex = 0;

/* ---------------- FETCH ---------------- */
fetch(sheetURL + "&t=" + Date.now())
.then(res => res.text())
.then(csvText => {

    const parseRow = (text)=>{
        let out=[],cur="",q=false;
        for(let c of text){
            if(c=='"') q=!q;
            else if(c==',' && !q){out.push(cur);cur="";}
            else cur+=c;
        }
        out.push(cur);
        return out.map(v=>v.replace(/^"|"$/g,'').trim());
    };

    const lines = csvText.split(/\r?\n/);
    const headers = parseRow(lines[0]);

    seminars = lines.slice(1)
    .filter(l=>l.trim())
    .map((l,i)=>{
        const v=parseRow(l);
        let obj={};
        headers.forEach((h,j)=>obj[h]=v[j]||"");
        obj.id=i;
        return obj;
    });

    const params = new URLSearchParams(window.location.search);
    currentIndex = params.get("id") ? parseInt(params.get("id")) : 0;

    loadSeminar(currentIndex);
});

/* ---------------- LOAD ---------------- */
function loadSeminar(i){
    const s = seminars[i];
    if(!s) return;

    document.getElementById("seminarType").innerText = s["Seminar Name"];
    document.getElementById("seminarTitle").innerText = s["Title of the Seminar"];
    document.getElementById("scholarName").innerText = s["Scholar Name"];
    document.getElementById("regId").innerText = s["Scholar Reg. ID"] || "N/A";

    document.getElementById("supervisorName").innerText = s["Supervisor Name"];
    document.getElementById("supervisorDesignation").innerText = s["Supervisor Designation"];

    document.getElementById("seminarDate").innerText = s["Date of the Seminar"];
    document.getElementById("seminarTime").innerText = s["Time of the Seminar"];
    document.getElementById("seminarMode").innerText = s["Mode of Seminar"];
    document.getElementById("venue").innerText = s["Venue of the Seminar"];

    /* ---------------- FORCE EXTERNAL REDIRECT ---------------- */
    setupLink("pptButton", s["PPT Shareable Link"]);
    setupLink("teamsButton", s["Microsoft Teams Link"]);

    document.getElementById("prevBtn").disabled = i<=0;
    document.getElementById("nextBtn").disabled = i>=seminars.length-1;
}

/* ---------------- SAFE LINK HANDLER ---------------- */
function setupLink(id, url){
    const btn = document.getElementById(id);

    if(!url || url.trim()===""){
        btn.style.display="none";
        return;
    }

    btn.onclick = (e)=>{
        e.preventDefault();
        window.open(url, "_blank", "noopener,noreferrer");
    };

    btn.href = url;
    btn.target = "_blank";
}

/* ---------------- NAV ---------------- */
document.getElementById("prevBtn").onclick=()=>{
    if(currentIndex>0){
        currentIndex--;
        loadSeminar(currentIndex);
        history.replaceState(null,"","?id="+currentIndex);
    }
};

document.getElementById("nextBtn").onclick=()=>{
    if(currentIndex<seminars.length-1){
        currentIndex++;
        loadSeminar(currentIndex);
        history.replaceState(null,"","?id="+currentIndex);
    }
};

</script>

</body>
</html>
