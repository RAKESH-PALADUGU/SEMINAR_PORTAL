<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Seminar Portal</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:35px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    margin-top:10px;
    color:#cbd5e1;
    font-size:18px;
}

.container{
    width:92%;
    max-width:1450px;
    margin:auto;
    padding:30px 0;
}

/* SEARCH */

.search-box{
    margin-bottom:25px;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
}

/* LIVE BOX */

.live-box{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:25px;
    border-radius:16px;
    margin-bottom:40px;
}

.live-box h2{
    margin-top:0;
}

.countdown{
    color:#facc15;
    font-size:22px;
    margin-top:10px;
}

/* SECTION */

.section-title{
    font-size:28px;
    color:#60a5fa;
    margin-top:45px;
    margin-bottom:20px;
}

/* CARD GRID */

.card-grid{
    display:grid;
    gap:20px;
    align-items:stretch;
}

.card-grid.one-card{
    grid-template-columns:1fr;
}

.card-grid.two-cards{
    grid-template-columns:1fr 1fr;
}

.card-grid.multi-cards{
    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));
}

/* SEMINAR CARD */

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:14px;
    padding:20px;
    transition:0.3s;
    cursor:pointer;
    min-height:210px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#2563eb;
}

.card-type{
    display:inline-block;
    background:#2563eb;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    margin-bottom:15px;
    width:fit-content;
}

.card-title{
    font-size:22px;
    margin-bottom:12px;
    line-height:1.4;
}

.card-info{
    color:#cbd5e1;
    margin:5px 0;
    font-size:14px;
}

/* MORE CARD */

.more-card{
    background:#1e293b;
    border:2px dashed #475569;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    color:#93c5fd;
    font-weight:bold;
    font-size:20px;
    min-height:210px;
    width:24%;
    min-width:170px;
}

.more-card:hover{
    background:#334155;
}

/* TABLE */

.table-container{
    margin-top:25px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111827;
    border-radius:14px;
    overflow:hidden;
}

th{
    background:#1e293b;
    color:#93c5fd;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #1e293b;
    color:#e2e8f0;
}

tr:hover{
    background:#1e293b;
    cursor:pointer;
}

/* BUTTON */

.log-btn-wrap{
    margin-top:18px;
    text-align:center;
}

.log-btn{
    background:#2563eb;
    border:none;
    color:white;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

.log-btn:hover{
    background:#1d4ed8;
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:flex-start;
    overflow:auto;
    padding:40px 20px;
    z-index:999;
}

.modal-content{
    width:100%;
    max-width:1200px;
    background:#111827;
    border-radius:16px;
    padding:25px;
}

.modal-close{
    float:right;
    font-size:30px;
    cursor:pointer;
    color:white;
}

.modal-title{
    font-size:28px;
    margin-bottom:25px;
    color:#60a5fa;
}

/* MODAL SEMINAR LIST */

.modal-list{
    display:grid;
    gap:18px;
}

.modal-card{
    background:#1e293b;
    border-radius:14px;
    padding:20px;
    cursor:pointer;
    transition:0.3s;
}

.modal-card:hover{
    background:#334155;
}

.modal-card .card-title{
    font-size:20px;
}

/* CLOCK */

.clock{
    margin-top:50px;
    text-align:center;
    color:#cbd5e1;
}

/* FOOTER */

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

/* MOBILE */

@media(max-width:900px){

    .card-grid,
    .card-grid.one-card,
    .card-grid.two-cards,
    .card-grid.multi-cards{
        grid-template-columns:1fr;
    }

    .more-card{
        width:100%;
        min-width:unset;
    }

    header h1{
        font-size:28px;
    }

}

</style>
</head>

<body>

<header>
    <h1>Department of Mechanical Engineering</h1>
    <p>Department Seminar Portal</p>
</header>

<div class="container">

    <!-- SEARCH -->

    <div class="search-box">
        <input
        type="text"
        id="searchBox"
        placeholder="Search by Title / Scholar / Reg ID...">
    </div>

    <!-- LIVE -->

    <div class="live-box">
        <h2>Today's Seminar</h2>
        <div id="todaySeminar">Loading...</div>
        <div class="countdown" id="countdown"></div>
    </div>

    <!-- UPCOMING -->

    <h2 class="section-title">Upcoming Seminars</h2>

    <div class="card-grid" id="upcomingContainer"></div>

    <!-- PREVIOUS -->

    <h2 class="section-title">Previous Seminars</h2>

    <div class="card-grid" id="previousContainer"></div>

    <!-- LOG -->

    <h2 class="section-title">Seminar Log</h2>

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Reg. ID</th>
                    <th>Scholar Name</th>
                    <th>Supervisor</th>
                    <th>Seminar</th>
                </tr>
            </thead>

            <tbody id="logTable"></tbody>

        </table>

    </div>

    <div class="log-btn-wrap">
        <button class="log-btn" id="toggleLogsBtn">
            View Full Log
        </button>
    </div>

    <!-- CLOCK -->

    <div class="clock">
        <div id="liveDate"></div>
        <div id="liveTime"></div>
    </div>

</div>

<!-- MODAL -->

<div class="modal" id="seminarModal">

    <div class="modal-content">

        <span class="modal-close"
        onclick="closeModal()">&times;</span>

        <div class="modal-title"
        id="modalTitle"></div>

        <div class="modal-list"
        id="modalList"></div>

    </div>

</div>

<footer>
Seminar Management System<br>
Department of Mechanical Engineering<br>
VFSTR, Vadlamudi
</footer>

<script>

/* ================= CONFIG ================= */

const sheetID =
"1SMkzv_zjjoPNvbkIxz5TGqquVnp4ecmnxClrXoaZraU";

const gid = "1424736644";

const sheetURL =
`https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

const MAX_VISIBLE_CARDS = 3;

const INITIAL_LOGS = 5;

const SEMINAR_DURATION_MIN = 60;

/* ================= STATE ================= */

let seminars = [];

let countdownInterval = null;

let showAllLogs = false;

/* ================= DATE ================= */

function parseDate(dateStr,timeStr="00:00"){

    if(!dateStr) return new Date(0);

    const [dd,mm,yyyy] =
    dateStr.split("/").map(Number);

    const [hh,mi] =
    (timeStr || "00:00").split(":").map(Number);

    return new Date(
        yyyy,
        mm-1,
        dd,
        hh||0,
        mi||0
    );

}

/* ================= CSV ================= */

function parseRow(text){

    let out = [];
    let cur = "";
    let q = false;

    for(let c of text){

        if(c=='"'){
            q=!q;
        }

        else if(c==',' && !q){
            out.push(cur);
            cur="";
        }

        else{
            cur+=c;
        }

    }

    out.push(cur);

    return out.map(v=>
        v.replace(/^"|"$/g,'').trim()
    );

}

/* ================= FETCH ================= */

async function loadData(){

    const res =
    await fetch(sheetURL + "&t=" + Date.now());

    const csv = await res.text();

    const lines = csv.split(/\r?\n/);

    const headers = parseRow(lines[0]);

    seminars = lines.slice(1)
    .filter(l=>l.trim())
    .map((l,i)=>{

        const vals = parseRow(l);

        let obj = {};

        headers.forEach((h,j)=>{
            obj[h] = vals[j] || "";
        });

        obj.id = i;

        obj._date =
        parseDate(
            obj["Date of the Seminar"],
            obj["Time of the Seminar"]
        );

        obj._end =
        new Date(
            obj._date.getTime() +
            SEMINAR_DURATION_MIN * 60000
        );

        return obj;

    });

    renderUI();

}

/* ================= UI ================= */

function renderUI(){

    renderCards();

    renderLogTable();

    setupToday();

}

/* ================= SEARCH ================= */

document.getElementById("searchBox")
.addEventListener("input",renderCards);

/* ================= GRID ================= */

function setGridClass(container,count){

    container.className = "card-grid";

    if(count === 1){
        container.classList.add("one-card");
    }

    else if(count === 2){
        container.classList.add("two-cards");
    }

    else{
        container.classList.add("multi-cards");
    }

}

/* ================= CARDS ================= */

function renderCards(){

    const upcomingContainer =
    document.getElementById("upcomingContainer");

    const previousContainer =
    document.getElementById("previousContainer");

    upcomingContainer.innerHTML = "";
    previousContainer.innerHTML = "";

    const search =
    document.getElementById("searchBox")
    .value
    .toLowerCase();

    const now = new Date();

    let upcoming = [];
    let previous = [];

    seminars.forEach(s=>{

        const text =
        (
            s["Title of the Seminar"] + " " +
            s["Scholar Name"] + " " +
            s["Scholar Reg. ID"]
        ).toLowerCase();

        if(!text.includes(search)) return;

        if(s._date >= now){
            upcoming.push(s);
        }

        else{
            previous.push(s);
        }

    });

    upcoming.sort((a,b)=>a._date-b._date);

    previous.sort((a,b)=>b._date-a._date);

    renderSection(
        upcoming,
        upcomingContainer,
        "Upcoming Seminars"
    );

    renderSection(
        previous,
        previousContainer,
        "Previous Seminars"
    );

}

/* ================= SECTION ================= */

function renderSection(data,container,title){

    const visible =
    data.slice(0,MAX_VISIBLE_CARDS);

    setGridClass(container,visible.length);

    visible.forEach(s=>{

        const card =
        createSeminarCard(s);

        container.appendChild(card);

    });

    if(data.length > MAX_VISIBLE_CARDS){

        const remain =
        data.length - MAX_VISIBLE_CARDS;

        const more =
        document.createElement("div");

        more.className = "more-card";

        more.innerHTML =
        `+${remain}<br>More`;

        more.onclick = ()=>{

            openModal(title,data);

        };

        container.appendChild(more);

    }

}

/* ================= CARD TEMPLATE ================= */

function createSeminarCard(s){

    const card =
    document.createElement("div");

    card.className = "card";

    card.onclick = ()=>{

        window.location.href =
        "seminar.html?id=" +
        encodeURIComponent(s.id);

    };

    card.innerHTML = `

        <div>

            <div class="card-type">
                ${s["Seminar Name"]}
            </div>

            <div class="card-title">
                ${s["Title of the Seminar"]}
            </div>

            <div class="card-info">
                <b>${s["Scholar Name"]}</b>
            </div>

            <div class="card-info">
                Reg. ID:
                ${s["Scholar Reg. ID"] || "N/A"}
            </div>

        </div>

        <div class="card-info">
            ${s["Date of the Seminar"]}
            |
            ${s["Time of the Seminar"]}
        </div>

    `;

    return card;

}

/* ================= MODAL ================= */

function openModal(title,data){

    document.getElementById("seminarModal")
    .style.display = "flex";

    document.getElementById("modalTitle")
    .innerText = title;

    const list =
    document.getElementById("modalList");

    list.innerHTML = "";

    data.forEach(s=>{

        const card =
        createSeminarCard(s);

        card.classList.add("modal-card");

        list.appendChild(card);

    });

}

function closeModal(){

    document.getElementById("seminarModal")
    .style.display = "none";

}

/* ================= LOG TABLE ================= */

function renderLogTable(){

    const tbody =
    document.getElementById("logTable");

    tbody.innerHTML = "";

    const sorted =
    [...seminars]
    .sort((a,b)=>b._date-a._date);

    const visible =
    showAllLogs
    ? sorted
    : sorted.slice(0,INITIAL_LOGS);

    visible.forEach(s=>{

        const row =
        document.createElement("tr");

        row.onclick = ()=>{

            window.location.href =
            "seminar.html?id=" +
            encodeURIComponent(s.id);

        };

        row.innerHTML = `

            <td>
                ${s["Date of the Seminar"] || "-"}
            </td>

            <td>
                ${s["Time of the Seminar"] || "-"}
            </td>

            <td>
                ${s["Scholar Reg. ID"] || "-"}
            </td>

            <td>
                ${s["Scholar Name"] || "-"}
            </td>

            <td>
                ${s["Supervisor Name"] || "-"}
            </td>

            <td>
                ${s["Seminar Name"] || "-"}
            </td>

        `;

        tbody.appendChild(row);

    });

    const remaining =
    sorted.length - INITIAL_LOGS;

    document.getElementById("toggleLogsBtn")
    .innerText =
    showAllLogs
    ? "Show Less"
    : `View ${remaining > 0 ? remaining : ""} More Logs`;

}

/* ================= LOG BUTTON ================= */

document.getElementById("toggleLogsBtn")
.addEventListener("click",()=>{

    showAllLogs = !showAllLogs;

    renderLogTable();

});

/* ================= TODAY ================= */

function setupToday(){

    const box =
    document.getElementById("todaySeminar");

    const cd =
    document.getElementById("countdown");

    const now = new Date();

    const active =
    seminars.find(s =>
        now >= s._date &&
        now <= s._end
    );

    if(active){

        box.innerHTML = `
            <h2>
                ${active["Title of the Seminar"]}
            </h2>

            <p>
                ${active["Scholar Name"]}
            </p>
        `;

        clearInterval(countdownInterval);

        countdownInterval =
        setInterval(()=>{

            const diff =
            active._end - new Date();

            if(diff <= 0){

                cd.innerHTML =
                "COMPLETED ✅";

                clearInterval(
                    countdownInterval
                );

                return;

            }

            const mins =
            Math.floor(diff / 60000);

            const secs =
            Math.floor(diff / 1000) % 60;

            cd.innerHTML =
            `LIVE 🔴 Ends in ${mins}m ${secs}s`;

        },1000);

        return;

    }

    const upcoming =
    seminars
    .filter(s=>s._date > now)
    .sort((a,b)=>a._date-b._date)[0];

    if(!upcoming){

        box.innerHTML =
        "No upcoming seminars";

        cd.innerHTML = "";

        return;

    }

    box.innerHTML = `

        <h2>
            ${upcoming["Title of the Seminar"]}
        </h2>

        <p>
            ${upcoming["Scholar Name"]}
        </p>

    `;

    clearInterval(countdownInterval);

    countdownInterval =
    setInterval(()=>{

        const diff =
        upcoming._date - new Date();

        if(diff <= 0){

            loadData();

            return;

        }

        const hrs =
        Math.floor(diff / 3600000);

        const mins =
        Math.floor(diff / 60000) % 60;

        const secs =
        Math.floor(diff / 1000) % 60;

        cd.innerHTML =
        `Starts in ${hrs}h ${mins}m ${secs}s`;

    },1000);

}

/* ================= CLOCK ================= */

setInterval(()=>{

    const n = new Date();

    document.getElementById("liveDate")
    .innerText =
    n.toLocaleDateString();

    document.getElementById("liveTime")
    .innerText =
    n.toLocaleTimeString();

},1000);

/* ================= INIT ================= */

loadData();

setInterval(loadData,60000);

</script>

</body>
</html>
