<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Seminar Portal</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:35px 20px;
    text-align:center;
}

header h1{margin:0;font-size:38px;}
header p{margin-top:10px;color:#cbd5e1;font-size:18px;}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:30px 0;
}

/* SEARCH */
.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:16px;
    background:#1e293b;
    color:white;
}

/* LIVE */
.live-box{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:25px;
    border-radius:16px;
    margin-bottom:40px;
}

.countdown{
    font-size:22px;
    margin-top:10px;
    color:#facc15;
}

/* SECTION */
.section-title{
    font-size:28px;
    margin-bottom:20px;
    color:#60a5fa;
}

/* CARDS */
.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:14px;
    padding:18px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:#2563eb;
}

.card-type{
    display:inline-block;
    background:#1d4ed8;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    margin-bottom:10px;
}

.card-title{
    font-size:20px;
    margin-bottom:10px;
}

.card-info{
    color:#cbd5e1;
    font-size:14px;
    margin:4px 0;
}

/* BUTTONS */
.btn-group{
    margin-top:12px;
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    text-align:center;
    padding:8px;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
    font-weight:bold;
}

.ppt{
    background:#2563eb;
    color:white;
}

.teams{
    background:#16a34a;
    color:white;
}

/* TABLE */
.table-container{
    margin-top:40px;
    background:#111827;
    border-radius:12px;
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #1e293b;
    text-align:left;
}

th{
    background:#1e293b;
    color:#93c5fd;
}

/* CLOCK */
.clock{
    text-align:center;
    margin-top:50px;
    color:#cbd5e1;
}

footer{
    text-align:center;
    padding:25px;
    color:#94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>Department of Mechanical Engineering</h1>
    <p>Department Seminar Portal</p>
</header>

<div class="container">

    <!-- SEARCH -->
    <div class="search-box">
        <input id="searchBox" placeholder="Search by Title / Scholar / Reg ID...">
    </div>

    <!-- LIVE -->
    <div class="live-box">
        <div style="font-size:30px;">Today's Seminar</div>
        <div id="todaySeminar">Loading...</div>
        <div class="countdown" id="countdown"></div>
    </div>

    <h2 class="section-title">Seminar Cards</h2>
    <div class="card-grid" id="cardContainer"></div>

    <h2 class="section-title">Seminar Log</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Scholar</th>
                    <th>Supervisor</th>
                    <th>PPT</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>

    <div class="clock">
        <div id="liveDate"></div>
        <div id="liveTime"></div>
    </div>

</div>

<footer>
Seminar Management System<br>
VFSTR, Vadlamudi
</footer>

<script>

const sheetID = "1SMkzv_zjjoPNvbkIxz5TGqquVnp4ecmnxClrXoaZraU";
const gid = "1424736644";
const sheetURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

let seminars = [];

function parseDate(dateStr, timeStr="00:00"){
    const [dd,mm,yyyy] = dateStr.split("/").map(Number);
    const [hh,mi] = (timeStr || "00:00").split(":").map(Number);
    return new Date(yyyy, mm-1, dd, hh||0, mi||0);
}

async function loadData(){
    const res = await fetch(sheetURL + "&t=" + Date.now());
    const csv = await res.text();

    const lines = csv.split(/\r?\n/);

    const parseRow = (text)=>{
        let out=[],cur="",q=false;
        for(let c of text){
            if(c=='"') q=!q;
            else if(c==',' && !q){out.push(cur);cur="";}
            else cur+=c;
        }
        out.push(cur);
        return out.map(v=>v.replace(/^"|"$/g,'').trim());
    };

    const headers = parseRow(lines[0]);

    seminars = lines.slice(1)
    .filter(l=>l.trim())
    .map((l,i)=>{
        const v=parseRow(l);
        let obj={};

        headers.forEach((h,j)=>obj[h]=v[j]||"");

        obj._date = parseDate(obj["Date of the Seminar"],obj["Time of the Seminar"]);
        obj.id = i;

        return obj;
    });

    renderCards();
    renderTable();
}

function renderCards(){

    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    const sorted = [...seminars].sort((a,b)=>a._date-b._date);

    sorted.forEach(s=>{

        const ppt = s["PPT Shareable Link"]?.trim();
        const teams = s["Microsoft Teams Link"]?.trim();

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="card-type">${s["Seminar Name"]}</div>
            <div class="card-title">${s["Title of the Seminar"]}</div>
            <div class="card-info"><b>${s["Scholar Name"]}</b></div>
            <div class="card-info">Reg ID: ${s["Scholar Reg. ID"] || ""}</div>

            <div class="btn-group">
                ${ppt ? `<a class="btn ppt" href="${ppt}" target="_blank">PPT</a>` : ""}
                ${teams ? `<a class="btn teams" href="${teams}" target="_blank">Teams</a>` : ""}
            </div>
        `;

        container.appendChild(card);
    });
}

function renderTable(){

    const tbody = document.getElementById("logTable");
    tbody.innerHTML = "";

    const sorted = [...seminars].sort((a,b)=>a._date-b._date);

    sorted.forEach(s=>{

        const ppt = s["PPT Shareable Link"]?.trim();

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${s.id}</td>
            <td>${s["Scholar Name"]}</td>
            <td>${s["Supervisor Name"] || ""}</td>
            <td>${ppt ? `<a href="${ppt}" target="_blank" style="color:#60a5fa">Open</a>` : "N/A"}</td>
        `;

        tbody.appendChild(row);
    });
}

/* CLOCK */
setInterval(()=>{
    const n=new Date();
    document.getElementById("liveDate").innerText=n.toLocaleDateString();
    document.getElementById("liveTime").innerText=n.toLocaleTimeString();
},1000);

loadData();
setInterval(loadData,60000);

</script>

</body>
</html>
