<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seminar Portal</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    text-align:center;
    padding:30px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.live-box{
    background:#1e3a8a;
    padding:20px;
    border-radius:12px;
}

.countdown{color:#facc15;margin-top:10px;font-size:20px;}

.section-title{color:#60a5fa;margin-top:30px;}

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{transform:scale(1.02);}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:20px;
}

.stat{
    background:#111827;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.clock{text-align:center;margin-top:30px;color:#cbd5e1;}
</style>
</head>

<body>

<header>
<h1>Department Seminar Portal</h1>
</header>

<div class="container">

<div class="live-box">
    <h2>Today's Seminar</h2>
    <div id="today">Loading...</div>
    <div class="countdown" id="countdown"></div>
</div>

<h2 class="section-title">Upcoming</h2>
<div id="upcoming" class="card-grid"></div>

<h2 class="section-title">Previous</h2>
<div id="previous" class="card-grid"></div>

<h2 class="section-title">Stats</h2>
<div class="stats">
    <div class="stat">Total<br><span id="total">0</span></div>
    <div class="stat">Thesis<br><span id="thesis">0</span></div>
    <div class="stat">Colloquium<br><span id="colloquium">0</span></div>
    <div class="stat">Research<br><span id="research">0</span></div>
</div>

<div class="clock">
<div id="date"></div>
<div id="time"></div>
</div>

</div>

<script>

/* ================= CONFIG ================= */
const API_URL = "YOUR_APPS_SCRIPT_URL_HERE";

/* ================= STATE ================= */
let seminars = [];
let countdown = null;

/* ================= DATE ================= */
function parseDate(d,t="00:00"){
    const [dd,mm,yy] = d.split("/").map(Number);
    const [hh,mi] = t.split(":").map(Number);
    return new Date(yy,mm-1,dd,hh||0,mi||0);
}

function todayStr(){
    const d=new Date();
    return String(d.getDate()).padStart(2,"0")+"/"+
           String(d.getMonth()+1).padStart(2,"0")+"/"+
           d.getFullYear();
}

/* ================= FETCH ================= */
async function load(){
    const res = await fetch(API_URL);
    const data = await res.json();

    seminars = data.map((s,i)=>({
        ...s,
        _date: parseDate(s["Date of the Seminar"], s["Time of the Seminar"]),
        id:i
    }));

    render();
}

/* ================= RENDER ================= */
function render(){

    const up=document.getElementById("upcoming");
    const prev=document.getElementById("previous");

    up.innerHTML="";
    prev.innerHTML="";

    let t=0,th=0,co=0,re=0;

    const sorted=[...seminars].sort((a,b)=>a._date-b._date);

    const today=new Date(); today.setHours(0,0,0,0);

    sorted.forEach(s=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <b>${s["Seminar Name"]}</b><br>
            ${s["Title of the Seminar"]}<br>
            ${s["Scholar Name"]}<br>
            ${s["Date of the Seminar"]}
        `;

        card.onclick=()=>{
            window.location.href="seminar.html?id="+s.id;
        };

        const d=new Date(s._date); d.setHours(0,0,0,0);

        if(d<today) prev.appendChild(card);
        else up.appendChild(card);

        t++;
        if(s["Seminar Name"]==="Thesis") th++;
        if(s["Seminar Name"]==="Colloquium") co++;
        if(s["Seminar Name"]==="Research Seminar") re++;
    });

    document.getElementById("total").innerText=t;
    document.getElementById("thesis").innerText=th;
    document.getElementById("colloquium").innerText=co;
    document.getElementById("research").innerText=re;

    todaySection();
}

/* ================= TODAY ================= */
function todaySection(){

    const tStr=todayStr();

    const s=seminars.find(x=>x["Date of the Seminar"]===tStr);

    const box=document.getElementById("today");
    const cd=document.getElementById("countdown");

    if(!s){
        box.innerText="No seminar today";
        cd.innerText="";
        return;
    }

    box.innerHTML=`<b>${s["Seminar Name"]}</b><br>${s["Title of the Seminar"]}`;

    const target=s._date;

    if(countdown) clearInterval(countdown);

    countdown=setInterval(()=>{

        const now=new Date();
        const diff=target-now;

        if(diff<=0){
            cd.innerText="LIVE NOW";
            clearInterval(countdown);
            return;
        }

        const h=Math.floor(diff/3600000)%24;
        const m=Math.floor(diff/60000)%60;
        const sec=Math.floor(diff/1000)%60;

        cd.innerText=`${h}h ${m}m ${sec}s`;

    },1000);
}

/* ================= CLOCK ================= */
setInterval(()=>{
    const n=new Date();
    document.getElementById("date").innerText=n.toLocaleDateString();
    document.getElementById("time").innerText=n.toLocaleTimeString();
},1000);

/* ================= AUTO REFRESH ================= */
load();
setInterval(load,60000);

</script>

</body>
</html>
