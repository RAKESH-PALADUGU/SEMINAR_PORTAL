<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Department Research Seminar Portal</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:35px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:38px;
}

header p{
    margin-top:10px;
    color:#cbd5e1;
    font-size:18px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:30px 0;
}

.section-title{
    font-size:28px;
    margin-bottom:20px;
    color:#60a5fa;
}

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:14px;
    padding:22px;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-4px);
    border-color:#2563eb;
}

.card-type{
    display:inline-block;
    background:#1d4ed8;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    margin-bottom:15px;
}

.card-title{
    font-size:22px;
    margin-bottom:15px;
    line-height:1.4;
}

.card-info{
    color:#cbd5e1;
    margin:8px 0;
    font-size:15px;
}

.live-box{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:25px;
    border-radius:16px;
    margin-bottom:40px;
}

.live-title{
    font-size:30px;
    margin-bottom:15px;
}

.countdown{
    font-size:22px;
    margin-top:15px;
    color:#facc15;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:25px;
}

.stat-card{
    background:#111827;
    padding:25px;
    border-radius:14px;
    text-align:center;
    border:1px solid #1e293b;
}

.stat-number{
    font-size:36px;
    color:#60a5fa;
    margin-top:10px;
}

.clock{
    text-align:center;
    margin-top:50px;
    color:#cbd5e1;
    font-size:18px;
}

footer{
    text-align:center;
    padding:25px;
    color:#94a3b8;
}

@media(max-width:700px){

    header h1{
        font-size:28px;
    }

    .section-title{
        font-size:24px;
    }

}

</style>
</head>

<body>

<header>

<h1>
Department of Mechanical Engineering
</h1>

<p>
Department Research Seminar Portal
</p>

</header>

<div class="container">

<!-- TODAY SECTION -->

<div class="live-box">

<div class="live-title">
Today's Seminar
</div>

<div id="todaySeminar">
Loading...
</div>

<div class="countdown" id="countdown">
Loading countdown...
</div>

</div>

<!-- UPCOMING -->

<h2 class="section-title">
Upcoming Seminars
</h2>

<div class="card-grid" id="upcomingContainer">

</div>

<!-- PREVIOUS -->

<h2 class="section-title" style="margin-top:50px;">
Previous Seminars
</h2>

<div class="card-grid" id="previousContainer">

</div>

<!-- STATISTICS -->

<h2 class="section-title" style="margin-top:50px;">
Department Statistics
</h2>

<div class="stats-grid">

<div class="stat-card">
<div>Total Seminars</div>
<div class="stat-number" id="totalSeminars">0</div>
</div>

<div class="stat-card">
<div>Thesis</div>
<div class="stat-number" id="thesisCount">0</div>
</div>

<div class="stat-card">
<div>Colloquium</div>
<div class="stat-number" id="colloquiumCount">0</div>
</div>

<div class="stat-card">
<div>Research Seminars</div>
<div class="stat-number" id="researchCount">0</div>
</div>

</div>

<!-- CLOCK -->

<div class="clock">

<div id="liveDate"></div>

<div id="liveTime"></div>

</div>

</div>

<footer>
Department Research Seminar Management System
</footer>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSvIa0ZvDl7V8PYBHrIhlbIhzdblx8ErY_2AhjXWLRPNYRY1oQ7U4cHgZKm95Bzy_06yNVFandfgiHT/pub?gid=1424736644&single=true&output=csv";

let seminars = [];

fetch(sheetURL)
.then(response => response.text())
.then(csvText => {

    const rows = csvText.split("\n").map(row => row.split(","));

    const headers = rows[0];

    for(let i=1;i<rows.length;i++){

        let rowData = {};

        headers.forEach((header,index)=>{

            rowData[header.trim()] =
            rows[i][index]
            ? rows[i][index].replace(/"/g,"").trim()
            : "";

        });

        seminars.push(rowData);

    }

    generateDashboard();

});

function generateDashboard(){

    const upcomingContainer =
    document.getElementById("upcomingContainer");

    const previousContainer =
    document.getElementById("previousContainer");

    let thesisCount = 0;
    let colloquiumCount = 0;
    let researchCount = 0;

    seminars.forEach((seminar,index)=>{

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

        <div class="card-type">
        ${seminar["Seminar Name"]}
        </div>

        <div class="card-title">
        ${seminar["Title of the Seminar"]}
        </div>

        <div class="card-info">
        ${seminar["Scholar Name"]}
        </div>

        <div class="card-info">
        ${seminar["Date of the Seminar"]}
        </div>

        `;

        card.onclick = () => {

            window.location.href =
            "seminar.html?id=" + index;

        };

        upcomingContainer.appendChild(card);

        // COUNTS

        if(seminar["Seminar Name"] === "Thesis"){
            thesisCount++;
        }

        if(seminar["Seminar Name"] === "Colloquium"){
            colloquiumCount++;
        }

        if(seminar["Seminar Name"] === "Research Seminar"){
            researchCount++;
        }

    });

    document.getElementById("totalSeminars")
    .innerText = seminars.length;

    document.getElementById("thesisCount")
    .innerText = thesisCount;

    document.getElementById("colloquiumCount")
    .innerText = colloquiumCount;

    document.getElementById("researchCount")
    .innerText = researchCount;

    // TODAY'S SEMINAR

    const latest =
    seminars[seminars.length - 1];

    document.getElementById("todaySeminar")
    .innerHTML = `

    <h2>
    ${latest["Seminar Name"]}
    </h2>

    <h3>
    ${latest["Title of the Seminar"]}
    </h3>

    <p>
    by ${latest["Scholar Name"]}
    </p>

    `;

}

// LIVE CLOCK

function updateClock(){

    const now = new Date();

    document.getElementById("liveDate")
    .innerText =
    now.toLocaleDateString();

    document.getElementById("liveTime")
    .innerText =
    now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
