<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Seminar Portal</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:35px 20px;
    text-align:center;
}

header h1{margin:0;font-size:38px;}
header p{margin-top:10px;color:#cbd5e1;font-size:18px;}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:30px 0;
}

/* SEARCH */
.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:16px;
    background:#1e293b;
    color:white;
}

.section-title{
    font-size:28px;
    margin-bottom:20px;
    color:#60a5fa;
}

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#111827;
    border:1px solid #1e293b;
    border-radius:14px;
    padding:22px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);
    border-color:#2563eb;
}

.card-type{
    display:inline-block;
    background:#1d4ed8;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    margin-bottom:15px;
}

.card-title{font-size:22px;margin-bottom:15px;}
.card-info{color:#cbd5e1;font-size:15px;margin:6px 0;}

.live-box{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:25px;
    border-radius:16px;
    margin-bottom:40px;
}

.countdown{
    font-size:22px;
    margin-top:10px;
    color:#facc15;
}

/* PIE CHART */
.chart-box{
    margin-top:40px;
    background:#111827;
    padding:20px;
    border-radius:14px;
    border:1px solid #1e293b;
    text-align:center;
}

canvas{
    max-width:400px;
    margin:auto;
}

.clock{
    text-align:center;
    margin-top:50px;
    color:#cbd5e1;
}

footer{
    text-align:center;
    padding:25px;
    color:#94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>Department of Mechanical Engineering</h1>
    <p>Department Seminar Portal</p>
</header>

<div class="container">

    <!-- SEARCH -->
    <div class="search-box">
        <input id="searchBox" type="text"
        placeholder="Search by Title / Scholar Name / Reg ID...">
    </div>

    <div class="live-box">
        <div style="font-size:30px;">Today's Seminar</div>
        <div id="todaySeminar">Loading...</div>
        <div class="countdown" id="countdown"></div>
    </div>

    <h2 class="section-title">Upcoming Seminars</h2>
    <div class="card-grid" id="upcomingContainer"></div>

    <h2 class="section-title">Previous Seminars</h2>
    <div class="card-grid" id="previousContainer"></div>

    <h2 class="section-title">Department Seminar Distribution</h2>
    <div class="chart-box">
        <canvas id="pieChart" width="400" height="400"></canvas>
    </div>

    <div class="clock">
        <div id="liveDate"></div>
        <div id="liveTime"></div>
    </div>

</div>

<footer>
Seminar Management System<br>
VFSTR, Vadlamudi
</footer>

<script>

const sheetID = "1SMkzv_zjjoPNvbkIxz5TGqquVnp4ecmnxClrXoaZraU";
const gid = "1424736644";
const sheetURL = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=${gid}`;

let seminars = [];
let countdownInterval = null;

function parseDate(dateStr, timeStr="00:00"){
    const [dd,mm,yyyy] = dateStr.split("/").map(Number);
    const [hh,mi] = (timeStr||"00:00").split(":").map(Number);
    return new Date(yyyy, mm-1, dd, hh||0, mi||0);
}

function getTodayStr(){
    const d = new Date();
    return String(d.getDate()).padStart(2,"0") + "/" +
           String(d.getMonth()+1).padStart(2,"0") + "/" +
           d.getFullYear();
}

async function loadData(){
    const res = await fetch(sheetURL + "&t=" + Date.now());
    const csv = await res.text();

    const lines = csv.split(/\r?\n/);

    const parseRow = (text)=>{
        let out=[],cur="",q=false;
        for(let c of text){
            if(c=='"') q=!q;
            else if(c==',' && !q){out.push(cur);cur="";}
            else cur+=c;
        }
        out.push(cur);
        return out.map(v=>v.replace(/^"|"$/g,'').trim());
    };

    const headers = parseRow(lines[0]);

    seminars = lines.slice(1).filter(l=>l.trim()).map((l,i)=>{
        const v=parseRow(l);
        let obj={};
        headers.forEach((h,j)=>obj[h]=v[j]||"");

        obj._date = parseDate(obj["Date of the Seminar"],obj["Time of the Seminar"]);
        obj.id = i;
        return obj;
    });

    generateUI();
    drawPieChart();
}

/* ---------------- UI ---------------- */
function generateUI(){

    const up=document.getElementById("upcomingContainer");
    const prev=document.getElementById("previousContainer");

    up.innerHTML="";
    prev.innerHTML="";

    const today=new Date(); today.setHours(0,0,0,0);

    seminars.sort((a,b)=>a._date-b._date).forEach(s=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="card-type">${s["Seminar Name"]}</div>
            <div class="card-title">${s["Title of the Seminar"]}</div>
            <div class="card-info"><b>${s["Scholar Name"]}</b></div>
            <div class="card-info">Reg ID: ${s["Scholar Reg. ID"] || "N/A"}</div>
            <div class="card-info">${s["Date of the Seminar"]}</div>
        `;

        card.onclick=()=>{
            window.location.href="seminar.html?id="+s.id;
        };

        const d=new Date(s._date); d.setHours(0,0,0,0);

        if(d<today) prev.appendChild(card);
        else up.appendChild(card);
    });

    setupToday();
}

/* ---------------- TODAY ---------------- */
function setupToday(){

    const todayStr=getTodayStr();
    const s=seminars.find(x=>x["Date of the Seminar"]===todayStr);

    const box=document.getElementById("todaySeminar");
    const cd=document.getElementById("countdown");

    if(!s){
        box.innerText="No seminar today";
        return;
    }

    box.innerHTML=`<b>${s["Seminar Name"]}</b><br>${s["Title of the Seminar"]}`;

}

/* ---------------- PIE CHART ---------------- */
function drawPieChart(){

    let thesis=0, col=0, res=0;

    seminars.forEach(s=>{
        if(s["Seminar Name"]==="Thesis") thesis++;
        else if(s["Seminar Name"]==="Colloquium") col++;
        else res++;
    });

    const canvas=document.getElementById("pieChart");
    const ctx=canvas.getContext("2d");

    const data=[thesis,col,res];
    const colors=["#2563eb","#facc15","#22c55e"];
    const labels=["Thesis","Colloquium","Research"];

    let total=data.reduce((a,b)=>a+b,0);
    let start=0;

    data.forEach((val,i)=>{
        let slice=(val/total)*Math.PI*2;

        ctx.beginPath();
        ctx.moveTo(200,200);
        ctx.fillStyle=colors[i];
        ctx.arc(200,200,150,start,start+slice);
        ctx.fill();

        start+=slice;
    });
}

/* CLOCK */
setInterval(()=>{
    const n=new Date();
    document.getElementById("liveDate").innerText=n.toLocaleDateString();
    document.getElementById("liveTime").innerText=n.toLocaleTimeString();
},1000);

loadData();

</script>

</body>
</html>
